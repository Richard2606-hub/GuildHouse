version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    networks:
      - guildhouse_net

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/packs:/app/packs
      - ./backend/data:/app/data
    environment:
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    restart: always
    networks:
      - guildhouse_net

networks:
  guildhouse_net:
    driver: bridge
